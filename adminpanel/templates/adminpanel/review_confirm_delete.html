{% extends "adminpanel/admin_base.html" %}
{% block title %}Delete Review{% endblock %}
{% block content %}
<div class="container mt-4">
  <h2>Delete Review</h2>
  <p>Are you sure you want to delete this review by <strong>{{ review.user.username }}</strong> for <strong>{{ review.restaurant.name }}</strong>?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, Delete</button>
    <a href="{% url 'adminpanel:review_list' %}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
